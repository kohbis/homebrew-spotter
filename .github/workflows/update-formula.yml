name: Update Formula

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to update to (e.g. v0.1.2)'
        required: true
        type: string

env:
  FORMULA_NAME: spotter

concurrency:
  group: update-formula-${{ github.event.inputs.version }}
  cancel-in-progress: false

jobs:
  update-formula:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Update formula
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
        run: |
          BRANCH_NAME="update-formula-${VERSION}"

          # Get SHA256 hashes from release files
          MACOS_SHA256=$(curl -sL "https://github.com/kohbis/${{ env.FORMULA_NAME }}/releases/download/${VERSION}/${{ env.FORMULA_NAME }}-macos.sha256" | cut -d' ' -f1)
          LINUX_SHA256=$(curl -sL "https://github.com/kohbis/${{ env.FORMULA_NAME }}/releases/download/${VERSION}/${{ env.FORMULA_NAME }}-linux.sha256" | cut -d' ' -f1)
          
          # Update formula file
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/${{ env.FORMULA_NAME }}.rb
          sed -i "s/sha256 \".*\" # macos/sha256 \"${MACOS_SHA256}\" # macos/" Formula/${{ env.FORMULA_NAME }}.rb
          sed -i "s/sha256 \".*\" # linux/sha256 \"${LINUX_SHA256}\" # linux/" Formula/${{ env.FORMULA_NAME }}.rb
          
          # Create branch and commit
          git checkout -B "${BRANCH_NAME}"
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add Formula/${{ env.FORMULA_NAME }}.rb
          git commit -m "Update formula to ${VERSION}"
          git push --force origin "${BRANCH_NAME}"

          # Create PR
          EXISTING_PR_URL=$(gh pr list --head "${BRANCH_NAME}" --base main --state open --json url --jq '.[0].url')
          if [ -n "${EXISTING_PR_URL}" ]; then
            echo "Pull request already exists: ${EXISTING_PR_URL}"
          else
            gh pr create \
              --base main \
              --head "${BRANCH_NAME}" \
              --title "Update formula to ${VERSION}" \
              --body "This PR updates the formula to version ${VERSION}."
          fi
